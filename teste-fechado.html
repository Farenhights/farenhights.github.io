<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fut Sinais | Teste Fechado</title>
  <style>
    :root {
      --bg: #071020;
      --bg-soft: #0d1730;
      --card: rgba(17, 24, 39, 0.88);
      --card-2: rgba(21, 29, 50, 0.92);
      --stroke: rgba(255, 255, 255, 0.08);
      --text: #f8faff;
      --muted: #b8c2df;
      --purple: #7c4dff;
      --purple-2: #5e36ff;
      --green: #2ad18b;
      --yellow: #f2c24f;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius: 28px;
      --radius-md: 22px;
      --max: 1100px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(124, 77, 255, 0.20), transparent 28%),
        radial-gradient(circle at bottom left, rgba(42, 209, 139, 0.10), transparent 24%),
        linear-gradient(180deg, #05101f 0%, #09142a 45%, #0d1730 100%);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 22px));
      margin: 0 auto;
    }

    .hero,
    .section,
    .footer-wrap {
      padding-top: 18px;
    }

    .hero-card,
    .section-card,
    .step-card,
    .shot-card,
    .footer-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card {
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 45%, rgba(124, 77, 255, 0.08) 100%);
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(124, 77, 255, 0.16);
      border: 1px solid rgba(124, 77, 255, 0.28);
      color: #e8e0ff;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.04;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0 auto;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      min-height: 54px;
      padding: 14px 22px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      transition: transform 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--purple-2));
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
    }

    .hero-note {
      margin-top: 16px;
      color: #d8e0fb;
      font-size: 14px;
      line-height: 1.65;
    }

    .play-badge-wrap {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    .play-badge {
      width: min(240px, 100%);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .section-card {
      padding: 24px;
    }

    .section-head {
      text-align: center;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .section-head p {
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.6;
      max-width: 680px;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .step-card {
      padding: 22px;
      background: var(--card-2);
      border-radius: var(--radius-md);
    }

    .step-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(42, 209, 139, 0.16);
      color: #7df0c8;
      font-weight: 800;
      margin-bottom: 14px;
    }
